worker_processes auto;  # 自动匹配 CPU 核数

events {
    worker_connections 10240;  # 每个 worker 最大连接数
    use epoll;                 # Linux 高性能事件模型
    multi_accept on;           # 同时接受多个连接
}

http {
    # 连接优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # 缓冲区设置（压测用）
    client_body_buffer_size 16K;
    client_header_buffer_size 1K;
    client_max_body_size 8M;

    # 上游服务器 - 负载均衡
    upstream shortlink_backend {
        least_conn;  # 最少连接算法，适合长连接场景

        server shortlink1:8080 weight=1 max_fails=3 fail_timeout=30s;
        server shortlink2:8081 weight=1 max_fails=3 fail_timeout=30s;
        server shortlink3:8082 weight=1 max_fails=3 fail_timeout=30s;

        keepalive 32;  # 保持连接池
    }

    server {
        listen 80;
        server_name studywithus.dpdns.org;

        # 访问日志
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        # 代理配置
        location / {
            proxy_pass http://shortlink_backend;

            # 代理头设置
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 连接设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # HTTP 1.1 支持长连接
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # 健康检查端点（可选）
        location /health {
            access_log off;
            return 200 "OK\n";
        }
    }
}